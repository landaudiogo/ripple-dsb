services:
  dns-media:
    image: defreitas/dns-proxy-server
    volumes:
    - ./dns3-config.json:/app/conf/config.json
    - /etc/resolv.conf:/etc/resolv.conf
  home-timeline-service:
    depends_on:
      jaeger-agent:
        condition: service_started
    entrypoint: HomeTimelineService
    hostname: home-timeline-service
    image: deathstarbench/social-network-microservices:latest
    ports:
    - 10010:10010
    restart: always
    volumes:
    - ./config-compose:/social-network-microservices/config
    - /etc/resolv.conf:/etc/resolv.conf
  jaeger-agent:
    environment:
    - COLLECTOR_ZIPKIN_HTTP_PORT=9411
    hostname: jaeger-agent
    image: jaegertracing/all-in-one:latest
    ports:
    - 16686:16686
    restart: always
  media-frontend:
    depends_on:
      jaeger-agent:
        condition: service_started
    hostname: media-frontend
    image: yg397/media-frontend:xenial
    ports:
    - 8081:8080
    restart: always
    volumes:
    - ./media-frontend/lua-scripts:/usr/local/openresty/nginx/lua-scripts
    - ./media-frontend/conf/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf
  media-memcached:
    hostname: media-memcached
    image: memcached
    ports:
    - 11215:11211
    restart: always
  media-mongodb:
    hostname: media-mongodb
    image: mongo:4.4.6
    ports:
    - 27024:27017
    restart: always
  media-service:
    depends_on:
      jaeger-agent:
        condition: service_started
      media-mongodb:
        condition: service_started
    entrypoint: MediaService
    hostname: media-service
    image: deathstarbench/social-network-microservices:latest
    ports:
    - 10006:10006
    restart: always
    volumes:
    - ./config-compose:/social-network-microservices/config
    - /etc/resolv.conf:/etc/resolv.conf
  nginx-thrift:
    depends_on:
      jaeger-agent:
        condition: service_started
    hostname: nginx-thrift
    image: yg397/openresty-thrift:xenial
    ports:
    - 3009:8080
    restart: always
    volumes:
    - ./nginx-web-server-compose/lua-scripts:/usr/local/openresty/nginx/lua-scripts
    - ./nginx-web-server-compose/pages:/usr/local/openresty/nginx/pages
    - ./nginx-web-server-compose/conf/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf
    - ./nginx-web-server-compose/jaeger-config.json:/usr/local/openresty/nginx/jaeger-config.json
    - ./gen-lua:/gen-lua
    - ./docker/openresty-thrift/lua-thrift:/usr/local/openresty/lualib/thrift
    - /etc/resolv.conf:/etc/resolv.conf
  text-service:
    depends_on:
      jaeger-agent:
        condition: service_started
    entrypoint: TextService
    hostname: text-service
    image: deathstarbench/social-network-microservices:latest
    ports:
    - 10007:10007
    restart: always
    volumes:
    - ./config-compose:/social-network-microservices/config
    - /etc/resolv.conf:/etc/resolv.conf
  unique-id-service:
    depends_on:
      jaeger-agent:
        condition: service_started
    entrypoint: UniqueIdService
    hostname: unique-id-service
    image: deathstarbench/social-network-microservices:latest
    ports:
    - 10008:10008
    restart: always
    volumes:
    - ./config-compose:/social-network-microservices/config
    - /etc/resolv.conf:/etc/resolv.conf
  user-mention-service:
    depends_on:
      jaeger-agent:
        condition: service_started
    entrypoint: UserMentionService
    hostname: user-mention-service
    image: deathstarbench/social-network-microservices:latest
    ports:
    - 10009:10009
    restart: always
    volumes:
    - ./config-compose:/social-network-microservices/config
    - /etc/resolv.conf:/etc/resolv.conf
